<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Quota Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <style>
    /* ═══ RESET & BASE ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    :root {
      --bg: #E0E5EC;
      --fg: #3D4852;
      --muted: #6B7280;
      --accent: #6C63FF;
      --accent-light: #8B84FF;
      --accent-secondary: #38B2AC;
      --shadow-dark: rgb(163, 177, 198, 0.6);
      --shadow-dark-strong: rgb(163, 177, 198, 0.7);
      --shadow-light: rgba(255, 255, 255, 0.5);
      --shadow-light-strong: rgba(255, 255, 255, 0.6);
      --radius-card: 32px;
      --radius-btn: 16px;
      --radius-inner: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .font-display {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* ═══ SHADOWS ═══ */
    .neu-extruded {
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
    }
    .neu-extruded-hover {
      box-shadow: 12px 12px 20px var(--shadow-dark-strong), -12px -12px 20px var(--shadow-light-strong);
    }
    .neu-extruded-sm {
      box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    }
    .neu-inset {
      box-shadow: inset 6px 6px 10px var(--shadow-dark), inset -6px -6px 10px var(--shadow-light);
    }
    .neu-inset-deep {
      box-shadow: inset 10px 10px 20px var(--shadow-dark-strong), inset -10px -10px 20px var(--shadow-light-strong);
    }
    .neu-inset-sm {
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    /* ═══ LAYOUT ═══ */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ═══ HEADER ═══ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(224, 229, 236, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 20px 0;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-inner);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      color: var(--fg);
    }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .last-updated {
      font-size: 13px;
      color: var(--muted);
    }

    /* ═══ BUTTONS ═══ */
    .btn {
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      border-radius: var(--radius-btn);
      padding: 12px 24px;
      background: var(--bg);
      color: var(--fg);
      transition: all 300ms ease-out;
      outline: none;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0.5px);
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), 0 0 0 2px var(--bg), 0 0 0 4px var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    }

    .btn-primary:hover {
      background: var(--accent-light);
      box-shadow: 8px 8px 16px var(--shadow-dark-strong), -8px -8px 16px var(--shadow-light-strong);
    }

    .btn-primary:active {
      box-shadow: inset 3px 3px 8px rgba(0,0,0,0.2), inset -3px -3px 8px rgba(255,255,255,0.1);
    }

    .btn-icon {
      padding: 12px;
      width: 48px;
      height: 48px;
      justify-content: center;
      border-radius: var(--radius-inner);
    }

    .btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }

    .btn.loading .btn-spinner {
      display: inline-block;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ═══ SUMMARY SECTION ═══ */
    .summary-section {
      padding: 40px 0 24px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    @media (max-width: 768px) {
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
      }
    }

    .summary-card {
      background: var(--bg);
      border-radius: var(--radius-card);
      padding: 28px;
      transition: all 300ms ease-out;
    }

    .summary-card:hover {
      transform: translateY(-2px);
    }

    .summary-card .label {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .summary-card .value {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 800;
      font-size: 42px;
      letter-spacing: -1px;
      line-height: 1;
    }

    .summary-card .icon-well {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    /* ═══ PROVIDERS SECTION ═══ */
    .providers-section {
      padding: 24px 0 60px;
    }

    .section-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.3px;
      color: var(--fg);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .provider-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
    }

    @media (max-width: 768px) {
      .provider-grid {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }

    .provider-card {
      background: var(--bg);
      border-radius: var(--radius-card);
      padding: 32px;
      transition: all 300ms ease-out;
    }

    .provider-card:hover {
      transform: translateY(-2px);
    }

    .provider-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .provider-name {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .provider-emoji-well {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-inner);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .provider-name h3 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.3px;
    }

    .method-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 6px 14px;
      border-radius: 9999px;
      color: var(--muted);
    }

    .method-badge.browser { color: var(--accent-secondary); }
    .method-badge.api { color: var(--accent); }

    /* ─── Status Indicator ─── */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.success { background: var(--accent-secondary); box-shadow: 0 0 8px rgba(56,178,172,0.4); }
    .status-dot.warning { background: #F59E0B; box-shadow: 0 0 8px rgba(245,158,11,0.4); }
    .status-dot.error { background: #EF4444; box-shadow: 0 0 8px rgba(239,68,68,0.4); }
    .status-dot.login { background: var(--accent); box-shadow: 0 0 8px rgba(108,99,255,0.4); }

    /* ─── Quota Bar ─── */
    .quota-section {
      margin: 16px 0;
    }

    .quota-bar-track {
      height: 14px;
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }

    .quota-bar-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 600ms ease-out;
      position: relative;
    }

    .quota-bar-fill.good {
      background: linear-gradient(90deg, var(--accent-secondary), #4FD1C5);
    }
    .quota-bar-fill.warning {
      background: linear-gradient(90deg, #F59E0B, #FBBF24);
    }
    .quota-bar-fill.critical {
      background: linear-gradient(90deg, #EF4444, #F87171);
    }

    .quota-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .quota-percent {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 32px;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .quota-sub {
      font-size: 13px;
      color: var(--muted);
    }

    /* ─── Hints ─── */
    .hints-well {
      border-radius: var(--radius-btn);
      padding: 16px 20px;
      margin-top: 16px;
    }

    .hint-item {
      font-size: 13px;
      color: var(--muted);
      padding: 4px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .hint-item::before {
      content: '›';
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ─── Screenshot Thumb ─── */
    .screenshot-thumb {
      margin-top: 16px;
      border-radius: var(--radius-btn);
      overflow: hidden;
      cursor: pointer;
      transition: all 300ms ease-out;
    }

    .screenshot-thumb:hover {
      transform: scale(1.02);
    }

    .screenshot-thumb img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      object-position: top;
      display: block;
      filter: contrast(0.95) brightness(1.02);
    }

    /* ─── Need Login Card ─── */
    .need-login-msg {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      border-radius: var(--radius-btn);
      margin-top: 8px;
    }

    .need-login-msg code {
      font-size: 12px;
      background: rgba(108, 99, 255, 0.08);
      padding: 4px 10px;
      border-radius: 8px;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      word-break: break-all;
    }

    /* ═══ CHART MODAL ═══ */
    .chart-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
      z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
    }
    .chart-modal.active { display: flex; }
    .chart-modal-content {
      background: var(--bg); border-radius: var(--radius-card);
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light);
      padding: 24px; max-width: 700px; width: 100%; max-height: 80vh; overflow-y: auto;
    }
    .chart-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .chart-modal-header h3 { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; }
    .chart-time-btns { display: flex; gap: 6px; margin-bottom: 12px; }
    .chart-time-btns button {
      padding: 6px 14px; border-radius: 10px; border: none; cursor: pointer; font-size: 12px; font-weight: 600;
      background: var(--bg); color: var(--text);
      box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
    }
    .chart-time-btns button.active {
      box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
      color: var(--accent);
    }

    /* ═══ MODAL (Screenshot Lightbox) ═══ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 40px;
      cursor: pointer;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: var(--radius-card);
      overflow: hidden;
    }

    .modal-content img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* ═══ TOAST ═══ */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      padding: 16px 28px;
      border-radius: var(--radius-btn);
      background: var(--bg);
      color: var(--fg);
      font-size: 14px;
      font-weight: 500;
      z-index: 2000;
      transform: translateY(100px);
      opacity: 0;
      transition: all 300ms ease-out;
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.success { color: var(--accent-secondary); }
    .toast.error { color: #EF4444; }

    /* ═══ EMPTY STATE ═══ */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .empty-state h2 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .empty-state p {
      color: var(--muted);
      max-width: 400px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ═══ ANIMATIONS ═══ */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .float { animation: float 3s ease-in-out infinite; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 500ms ease-out forwards;
    }

    .provider-card { opacity: 0; }
    .provider-card.loaded { animation: fadeIn 500ms ease-out forwards; }

    /* ═══ CARD STATUS BORDERS ═══ */
    .provider-card.card-warning {
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), inset 0 0 0 2px rgba(245,158,11,0.4);
    }
    .provider-card.card-critical {
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), inset 0 0 0 2px rgba(239,68,68,0.5);
      animation: pulse-critical 2s ease-in-out infinite;
    }
    .provider-card.card-error {
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), inset 0 0 0 2px rgba(239,68,68,0.3);
    }
    .provider-card.card-login {
      box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), inset 0 0 0 2px rgba(108,99,255,0.3);
    }

    @keyframes pulse-critical {
      0%, 100% { box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), inset 0 0 0 2px rgba(239,68,68,0.5); }
      50% { box-shadow: 9px 9px 16px var(--shadow-dark), -9px -9px 16px var(--shadow-light), inset 0 0 0 3px rgba(239,68,68,0.8); }
    }

    /* ═══ ALERT BANNER ═══ */
    .alert-banner {
      background: var(--bg);
      border-radius: var(--radius-btn);
      padding: 14px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 500;
    }
    .alert-banner.warning {
      color: #B45309;
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), inset 0 0 0 2px rgba(245,158,11,0.3);
    }
    .alert-banner.critical {
      color: #DC2626;
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light), inset 0 0 0 2px rgba(239,68,68,0.4);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="container header-inner">
      <div class="logo">
        <div class="logo-icon neu-inset-deep">📊</div>
        <h1 class="font-display">LLM Quota</h1>
      </div>
      <div class="header-actions">
        <span class="last-updated" id="lastUpdated">—</span>
        <button class="btn neu-extruded-sm btn-icon" id="refreshBtn" title="Refresh" onclick="refreshData()">
          <span id="refreshIcon">⟳</span>
        </button>
      </div>
    </div>
  </header>

  <!-- SUMMARY -->
  <section class="summary-section">
    <div class="container">
      <div class="summary-grid" id="summaryGrid">
        <!-- Filled by JS -->
      </div>
    </div>
  </section>

  <!-- PROVIDERS -->
  <section class="providers-section">
    <div class="container">
      <!-- Chart Modal -->
      <div class="chart-modal" id="chartModal" onclick="if(event.target===this)closeChart()">
        <div class="chart-modal-content">
          <div class="chart-modal-header">
            <h3 id="chartTitle">Usage History</h3>
            <button class="btn neu-extruded-sm" onclick="closeChart()" style="padding:6px 12px;border-radius:10px;font-size:14px;">✕</button>
          </div>
          <div class="chart-time-btns" id="chartTimeBtns">
            <button onclick="loadChart(currentChartProvider,6)" data-h="6">6h</button>
            <button onclick="loadChart(currentChartProvider,24)" data-h="24" class="active">24h</button>
            <button onclick="loadChart(currentChartProvider,168)" data-h="168">7d</button>
          </div>
          <canvas id="historyChart" height="250"></canvas>
          <div id="chartEmpty" style="display:none;text-align:center;padding:40px;color:var(--muted);">No history data yet. Charts populate after a few scraper runs.</div>
        </div>
      </div>

      <div id="alertBanner"></div>
      <div class="section-title">
        <span>Providers</span>
      </div>
      <div class="provider-grid" id="providerGrid">
        <!-- Filled by JS -->
      </div>
    </div>
  </section>

  <!-- SCREENSHOT MODAL -->
  <div class="modal-overlay" id="modal" onclick="closeModal()">
    <div class="modal-content neu-extruded" onclick="event.stopPropagation()">
      <img id="modalImg" src="" alt="Screenshot">
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast neu-extruded" id="toast"></div>

  <script>
    let providerMeta = {};
    let quotaData = {};

    // ═══ INIT ═══
    async function init() {
      const [providers, data] = await Promise.all([
        fetch('/api/providers').then(r => r.json()).catch(() => ({})),
        fetch('/api/data').then(r => r.json()).catch(() => ({})),
      ]);
      providerMeta = providers;
      quotaData = data;
      render();
    }

    // ═══ RENDER ═══
    function render() {
      renderSummary();
      renderAlerts();
      renderProviders();
      renderLastUpdated();
    }

    function renderAlerts() {
      const alerts = [];
      for (const [key, config] of Object.entries(providerMeta)) {
        if (!config.enabled) continue;
        const d = quotaData[key];
        if (!d || d.status !== 'success') continue;
        const sd = d.data || {};
        const pctFields = ['session_used_pct','weekly_used_pct','weekly_all_used_pct','5h_quota_used_pct','5h_used_pct','current_used_pct','weekly_quota_used_pct','monthly_used_pct'];
        for (const f of pctFields) {
          if (sd[f] != null) {
            const rem = 100 - sd[f];
            if (rem < 10) alerts.push({ provider: config.name || key, field: f.replace('_used_pct','').replace('_',' '), remaining: rem, level: 'critical' });
            else if (rem < 20) alerts.push({ provider: config.name || key, field: f.replace('_used_pct','').replace('_',' '), remaining: rem, level: 'warning' });
          }
        }
      }

      const el = document.getElementById('alertBanner');
      if (!alerts.length) { el.innerHTML = ''; return; }

      const critical = alerts.filter(a => a.level === 'critical');
      const warning = alerts.filter(a => a.level === 'warning');

      let html = '';
      if (critical.length) {
        html += `<div class="alert-banner critical neu-inset-sm">
          <span style="font-size: 20px">🚨</span>
          <span>${critical.map(a => `<b>${a.provider}</b> ${a.field}: ${a.remaining}% left`).join(' · ')}</span>
        </div>`;
      }
      if (warning.length) {
        html += `<div class="alert-banner warning neu-inset-sm">
          <span style="font-size: 20px">⚠️</span>
          <span>${warning.map(a => `<b>${a.provider}</b> ${a.field}: ${a.remaining}% left`).join(' · ')}</span>
        </div>`;
      }
      el.innerHTML = html;
    }

    function renderLastUpdated() {
      const ts = quotaData.last_updated;
      const el = document.getElementById('lastUpdated');
      if (!ts) { el.textContent = 'Never checked'; return; }
      try {
        const d = new Date(ts);
        const ago = formatTimeAgo(ts);
        el.textContent = `Updated ${ago} · ${d.toLocaleString('en-HK', { 
          month: 'short', day: 'numeric', 
          hour: '2-digit', minute: '2-digit',
          hour12: false 
        })}`;
      } catch { el.textContent = ts; }
    }

    function renderSummary() {
      const counts = { success: 0, warning: 0, error: 0, login: 0 };
      
      for (const [key, config] of Object.entries(providerMeta)) {
        if (!config.enabled) continue;
        const d = quotaData[key];
        if (!d) { counts.error++; continue; }
        
        const status = d.status;
        if (status === 'need_login') { counts.login++; continue; }
        if (status !== 'success') { counts.error++; continue; }
        
        // Check if any quota is low (using structured data)
        const sd = d.data || {};
        const pctFields = ['session_used_pct','weekly_used_pct','weekly_all_used_pct','5h_quota_used_pct','current_used_pct','weekly_quota_used_pct'];
        const hasWarning = pctFields.some(f => sd[f] != null && (100 - sd[f]) < 20);
        
        // Also check old format
        const pct = getQuotaPercent(d);
        if (hasWarning || (pct !== null && pct < 20)) { counts.warning++; }
        else { counts.success++; }
      }

      const cards = [
        { label: 'Normal', value: counts.success, color: 'var(--accent-secondary)', icon: '✓' },
        { label: 'Warning', value: counts.warning, color: '#F59E0B', icon: '⚡' },
        { label: 'Error', value: counts.error, color: '#EF4444', icon: '✕' },
        { label: 'Login', value: counts.login, color: 'var(--accent)', icon: '🔑' },
      ];

      document.getElementById('summaryGrid').innerHTML = cards.map(c => `
        <div class="summary-card neu-extruded fade-in">
          <div class="label">
            <div class="icon-well neu-inset" style="color: ${c.color}">${c.icon}</div>
            ${c.label}
          </div>
          <div class="value" style="color: ${c.color}">${c.value}</div>
        </div>
      `).join('');
    }

    function renderProviders() {
      const grid = document.getElementById('providerGrid');
      const keys = Object.keys(providerMeta).filter(k => providerMeta[k].enabled !== false);
      
      if (!keys.length) {
        grid.innerHTML = `
          <div class="empty-state neu-extruded" style="grid-column: 1/-1; border-radius: var(--radius-card);">
            <div class="icon">🔧</div>
            <h2 class="font-display">No Providers</h2>
            <p>Run <code>python check_quota.py --setup</code> to add LLM providers.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = keys.map((key, i) => {
        try {
          const config = providerMeta[key];
          const data = quotaData[key] || {};
          return renderProviderCard(key, config, data, i);
        } catch (e) {
          console.error(`Card render error for ${key}:`, e);
          return `<div class="provider-card neu-extruded card-error"><div style="padding:20px;color:#EF4444;">⚠️ ${key}: render error</div></div>`;
        }
      }).join('');

      // Stagger fade-in
      grid.querySelectorAll('.provider-card').forEach((card, i) => {
        setTimeout(() => card.classList.add('loaded'), i * 80);
      });
    }

    function renderProviderCard(key, config, data, index) {
      const status = data.status || 'unknown';
      const method = data.method || '';
      const name = config.name || key;
      const emoji = config.color || '•';
      const d = data.data || {};  // Structured data from DOM scraper
      
      let statusDotClass = 'error';
      if (status === 'success') statusDotClass = 'success';
      else if (status === 'need_login') statusDotClass = 'login';

      let bodyHtml = '';

      // Quota fields definition (shared by success and need_login)
      const quotaFields = [
        ['session_used_pct', 'Session', d.session_reset],
        ['5h_quota_used_pct', '5h Quota', d['5h_refresh'] || null],
        ['5h_used_pct', '5h Quota', d['5h_refresh'] || null],
        ['weekly_used_pct', 'Weekly', d.weekly_reset || d.weekly_refresh || null],
        ['weekly_all_used_pct', 'Weekly (all)', d.weekly_all_reset],
        ['weekly_sonnet_used_pct', 'Sonnet', d.weekly_sonnet_reset],
        ['weekly_quota_used_pct', 'Weekly', d.weekly_reset],
        ['rate_limit_used_pct', 'Rate Limit', null],
        ['monthly_search_used_pct', 'Search', d.monthly_search_reset],
        ['monthly_used_pct', 'Monthly', d.monthly_refresh || null],
        ['current_used_pct', 'Current', d.reset_in],
        ['extra_used_pct', 'Extra', d.extra_reset],
      ];

      if (status === 'success') {
        // Plan name
        if (d.plan) {
          bodyHtml += `<div style="font-size: 13px; color: var(--muted); margin-bottom: 12px;">${escHtml(d.plan)}${d.tier ? ' · ' + escHtml(d.tier) : ''}</div>`;
        } else if (d.tier) {
          bodyHtml += `<div style="font-size: 13px; color: var(--muted); margin-bottom: 12px;">🎵 ${escHtml(d.tier)}${d.model ? ' · ' + d.model : ''}</div>`;
        }
        
        let hasBar = false;
        for (const [field, label, resetInfo] of quotaFields) {
          const usedPct = d[field];
          if (usedPct == null) continue;
          hasBar = true;
          
          const remaining = 100 - usedPct;
          const isExtra = field === 'extra_used_pct';
          const barClass = isExtra ? 'good' : remaining < 10 ? 'critical' : remaining < 30 ? 'warning' : 'good';
          const color = isExtra ? 'var(--accent-secondary)' : remaining < 10 ? '#EF4444' : remaining < 30 ? '#F59E0B' : 'var(--accent-secondary)';
          
          bodyHtml += `
            <div class="quota-section" style="margin: 8px 0;">
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div>
                  <span class="quota-percent" style="color: ${color}; font-size: 24px;">${remaining}%</span>
                  <span style="font-size: 12px; color: var(--muted); margin-left: 4px;">${label}</span>
                </div>
                ${resetInfo ? `<span style="font-size: 11px; color: var(--muted);">${escHtml(String(resetInfo))}</span>` : ''}
              </div>
              <div class="quota-bar-track neu-inset-sm" style="margin-top: 6px; height: 10px;">
                <div class="quota-bar-fill ${barClass}" style="width: ${usedPct}%;"></div>
              </div>
            </div>
          `;
        }
        
        // Money section
        if (d.extra_spent_usd != null || d.balance_usd != null || d.price_usd_month != null) {
          bodyHtml += `<div class="hints-well neu-inset-sm" style="margin-top: 12px;">`;
          if (d.extra_spent_usd != null && d.monthly_limit_usd != null) {
            bodyHtml += `<div class="hint-item">💰 $${d.extra_spent_usd.toFixed(2)} / $${d.monthly_limit_usd.toFixed(0)} spent</div>`;
          }
          if (d.balance_usd != null) {
            bodyHtml += `<div class="hint-item">💳 $${d.balance_usd.toFixed(2)} balance</div>`;
          }
          if (d.price_usd_month != null) {
            bodyHtml += `<div class="hint-item">💰 $${d.price_usd_month}/month</div>`;
          }
          bodyHtml += `</div>`;
        }
        
        // Stats
        const stats = [];
        if (d.total_tokens) stats.push(`🔢 ${d.total_tokens.toLocaleString()} tokens`);
        if (d.remaining_days) stats.push(`📅 ${d.remaining_days} days left`);
        if (d.prompts_per_window) stats.push(`📊 ${d.prompts_per_window} / ${d.window_hours || '?'}h`);
        if (d.valid_until) stats.push(`📅 Until ${d.valid_until}`);
        if (d.current_window) stats.push(`⏰ ${d.current_window}`);
        
        if (stats.length) {
          bodyHtml += `<div class="hints-well neu-inset-sm" style="margin-top: 8px;">`;
          stats.forEach(s => { bodyHtml += `<div class="hint-item">${s}</div>`; });
          bodyHtml += `</div>`;
        }
        
        // Prompts-per-window bar (MiniMax style)
        if (!hasBar && d.prompts_per_window && d.window_hours) {
          bodyHtml += `
            <div class="quota-section" style="margin: 8px 0;">
              <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <div>
                  <span class="quota-percent" style="color: var(--accent-secondary); font-size: 24px;">${d.prompts_per_window}</span>
                  <span style="font-size: 12px; color: var(--muted); margin-left: 4px;">prompts / ${d.window_hours}h window</span>
                </div>
                ${d.current_window ? `<span style="font-size: 11px; color: var(--muted);">${escHtml(String(d.current_window))}</span>` : ''}
              </div>
              <div class="quota-bar-track neu-inset-sm" style="margin-top: 6px; height: 10px;">
                <div class="quota-bar-fill good" style="width: 100%;"></div>
              </div>
            </div>
          `;
          hasBar = true;
        }

        // Fallback if nothing rendered
        if (!hasBar && !stats.length && !d.plan && !d.tier) {
          bodyHtml = `<div class="hints-well neu-inset-sm"><div class="hint-item" style="color: var(--accent-secondary)">Dashboard accessible</div></div>`;
        }

        // Screenshot (optional)
        const shot = data.screenshot;
        if (shot) {
          const filename = shot.split('/').pop();
          bodyHtml += `
            <div class="screenshot-thumb neu-inset-sm" onclick="openModal('/api/screenshots/${encodeURIComponent(filename)}')">
              <img src="/api/screenshots/${encodeURIComponent(filename)}" alt="${name}" loading="lazy">
            </div>
          `;
        }

      } else if (status === 'need_login') {
        // Show login warning banner, but still render last success data if available
        bodyHtml = `
          <div class="need-login-msg neu-inset" style="margin-bottom: 10px;">
            <span style="font-size: 18px">🔑</span>
            <div>
              <div style="font-size: 12px; font-weight: 500;">Login expired</div>
              <code style="font-size: 10px;">python check_quota.py --login ${key}</code>
            </div>
          </div>
        `;
        // If we have cached data fields, render them below the warning (greyed out)
        const hasFields = quotaFields.some(([f]) => d[f] != null);
        const hasStats = d.prompts_per_window || d.total_tokens || d.remaining_days || d.plan || d.tier;
        if (hasFields || hasStats) {
          bodyHtml += `<div style="opacity: 0.5;">`;
          for (const [field, label, resetInfo] of quotaFields) {
            const usedPct = d[field];
            if (usedPct == null) continue;
            const remaining = 100 - usedPct;
            const isExtra = field === 'extra_used_pct';
            const barClass = isExtra ? 'good' : remaining < 10 ? 'critical' : remaining < 30 ? 'warning' : 'good';
            const color = isExtra ? 'var(--accent-secondary)' : remaining < 10 ? '#EF4444' : remaining < 30 ? '#F59E0B' : 'var(--accent-secondary)';
            bodyHtml += `
              <div class="quota-section" style="margin: 8px 0;">
                <div style="display: flex; justify-content: space-between; align-items: baseline;">
                  <div>
                    <span class="quota-percent" style="color: ${color}; font-size: 24px;">${remaining}%</span>
                    <span style="font-size: 12px; color: var(--muted); margin-left: 4px;">${label}</span>
                  </div>
                  ${resetInfo ? `<span style="font-size: 11px; color: var(--muted);">${escHtml(String(resetInfo))}</span>` : ''}
                </div>
                <div class="quota-bar-track neu-inset-sm" style="margin-top: 6px; height: 10px;">
                  <div class="quota-bar-fill ${barClass}" style="width: ${usedPct}%;"></div>
                </div>
              </div>
            `;
          }
          const stats = [];
          if (d.total_tokens) stats.push(`🔢 ${d.total_tokens.toLocaleString()} tokens`);
          if (d.prompts_per_window) stats.push(`📊 ${d.prompts_per_window} / ${d.window_hours || '?'}h`);
          if (stats.length) {
            bodyHtml += `<div class="hints-well neu-inset-sm" style="margin-top: 8px;">`;
            stats.forEach(s => { bodyHtml += `<div class="hint-item">${s}</div>`; });
            bodyHtml += `</div>`;
          }
          bodyHtml += `</div>`; // close opacity wrapper
        }
      } else {
        const msg = data.message || 'No data';
        bodyHtml = `
          <div class="need-login-msg neu-inset">
            <span style="font-size: 24px">⚠️</span>
            <div style="font-size: 13px; color: var(--muted)">${escHtml(msg.substring(0, 80))}</div>
          </div>
        `;
      }

      // Determine card status class
      let cardClass = '';
      if (status === 'need_login') cardClass = 'card-login';
      else if (status !== 'success') cardClass = 'card-error';
      else {
        const pctFields = ['session_used_pct','weekly_used_pct','weekly_all_used_pct','5h_quota_used_pct','5h_used_pct','current_used_pct','weekly_quota_used_pct','monthly_used_pct','rate_limit_used_pct'];
        const remaining = pctFields.map(f => d[f] != null ? 100 - d[f] : null).filter(v => v !== null);
        const minRemaining = remaining.length ? Math.min(...remaining) : 100;
        if (minRemaining < 10) cardClass = 'card-critical';
        else if (minRemaining < 20) cardClass = 'card-warning';
      }

      return `
        <div class="provider-card neu-extruded ${cardClass}">
          <div class="provider-header">
            <div class="provider-name">
              <div class="provider-emoji-well neu-inset-deep">${emoji}</div>
              <div>
                <h3>${escHtml(name)}</h3>
                <span class="status-dot ${statusDotClass}"></span>
                <span style="font-size: 12px; color: var(--muted)">${statusLabel(status)}</span>
              </div>
            </div>
            ${method ? `<span class="method-badge neu-inset-sm ${method.replace('browser_cdp','browser')}">${method === 'browser_cdp' ? 'CDP' : method.toUpperCase()}</span>` : ''}
          </div>
          ${bodyHtml}
          <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px;">
            ${data.last_checked ? `<span style="font-size: 11px; color: var(--muted);">🕐 ${formatTimeAgo(data.last_checked)}</span>` : '<span></span>'}
            <div style="display:flex;gap:6px;">
              <button class="btn neu-extruded-sm" style="padding:6px 12px;min-height:32px;font-size:11px;border-radius:10px;" onclick="openChart('${key}','${escHtml(name)}')" title="History">📈</button>
              <button class="btn neu-extruded-sm" style="padding:6px 12px;min-height:32px;font-size:11px;border-radius:10px;" onclick="refreshProvider('${key}', this)" title="Refresh">⟳</button>
            </div>
          </div>
        </div>
      `;
    }

    // ═══ HELPERS ═══
    function getQuotaPercent(data) {
      for (const src of [data, data?.api_data || {}]) {
        const w = src?.['5h_window'];
        if (w && w.quota_percent != null) return w.quota_percent;
      }
      return null;
    }

    function formatResetTime(data) {
      for (const src of [data, data?.api_data || {}]) {
        const reset = src?.['5h_window']?.reset_at;
        if (reset) {
          try {
            const d = new Date(reset);
            const now = new Date();
            const diff = d - now;
            if (diff < 0) return 'reset overdue';
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            if (h > 24) return `resets ${d.toLocaleDateString('en-HK', {month:'short',day:'numeric'})}`;
            return h > 0 ? `resets in ${h}h ${m}m` : `resets in ${m}m`;
          } catch { return ''; }
        }
      }
      return '';
    }

    function formatTimeAgo(ts) {
      try {
        const d = new Date(ts);
        const now = new Date();
        const diff = now - d;
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'just now';
        if (mins < 60) return `${mins}m ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}h ${mins % 60}m ago`;
        const days = Math.floor(hrs / 24);
        return `${days}d ago`;
      } catch { return ts; }
    }

    function statusLabel(s) {
      const map = { success: 'Online', need_login: 'Need login', error: 'Error' };
      return map[s] || s;
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    // ═══ ACTIONS ═══
    async function refreshData() {
      const btn = document.getElementById('refreshBtn');
      const icon = document.getElementById('refreshIcon');
      btn.classList.add('loading');
      icon.classList.add('btn-spinner');
      
      showToast('Refreshing...', '');

      try {
        const resp = await fetch('/api/refresh', { method: 'POST' });
        const result = await resp.json();
        
        if (result.status === 'ok') {
          showToast('✓ Refreshed', 'success');
          // Reload data
          quotaData = await fetch('/api/data').then(r => r.json());
          render();
        } else {
          showToast('Refresh failed', 'error');
        }
      } catch (e) {
        showToast('Network error', 'error');
      } finally {
        btn.classList.remove('loading');
        icon.classList.remove('btn-spinner');
      }
    }

    function openModal(src) {
      document.getElementById('modalImg').src = src;
      document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }

    function showToast(msg, type) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = `toast neu-extruded show ${type}`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ESC to close modal
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // ═══ CHART ═══
    let currentChartProvider = null;
    let historyChart = null;
    const chartColors = ['#6C63FF','#00D9A6','#F59E0B','#EF4444','#8B5CF6','#EC4899','#14B8A6'];

    function openChart(provider, name) {
      currentChartProvider = provider;
      document.getElementById('chartTitle').textContent = name + ' — Usage History';
      document.getElementById('chartModal').classList.add('active');
      loadChart(provider, 24);
    }

    function closeChart() {
      document.getElementById('chartModal').classList.remove('active');
      if (historyChart) { historyChart.destroy(); historyChart = null; }
    }

    async function loadChart(provider, hours) {
      // Update active button
      document.querySelectorAll('#chartTimeBtns button').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.h) === hours);
      });

      try {
        const resp = await fetch(`/api/history/${provider}?hours=${hours}`);
        const data = await resp.json();

        if (!data.length) {
          document.getElementById('historyChart').style.display = 'none';
          document.getElementById('chartEmpty').style.display = 'block';
          if (historyChart) { historyChart.destroy(); historyChart = null; }
          return;
        }
        document.getElementById('historyChart').style.display = 'block';
        document.getElementById('chartEmpty').style.display = 'none';

        // Group by field
        const fields = {};
        for (const d of data) {
          if (!fields[d.field]) fields[d.field] = [];
          fields[d.field].push({ x: new Date(d.timestamp), y: d.value });
        }

        const datasets = Object.entries(fields).map(([field, points], i) => ({
          label: field.replace('_used_pct', '').replace(/_/g, ' '),
          data: points,
          borderColor: chartColors[i % chartColors.length],
          backgroundColor: chartColors[i % chartColors.length] + '20',
          fill: true,
          tension: 0.3,
          pointRadius: points.length > 50 ? 0 : 3,
          borderWidth: 2,
        }));

        if (historyChart) historyChart.destroy();
        historyChart = new Chart(document.getElementById('historyChart'), {
          type: 'line',
          data: { datasets },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: { type: 'time', time: { tooltipFormat: 'MMM d, HH:mm' },
                ticks: { color: '#999', maxTicksLimit: 8 }, grid: { display: false } },
              y: { min: 0, max: 100, ticks: { color: '#999', callback: v => v + '%' },
                grid: { color: 'rgba(150,150,150,0.1)' } }
            },
            plugins: {
              legend: { position: 'bottom', labels: { color: '#999', usePointStyle: true, padding: 16 } },
              tooltip: { backgroundColor: 'rgba(30,30,30,0.9)', titleColor: '#fff', bodyColor: '#ddd',
                callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}%` } }
            }
          }
        });
      } catch (e) {
        console.error('Chart load error:', e);
        document.getElementById('chartEmpty').textContent = 'Error loading history';
        document.getElementById('chartEmpty').style.display = 'block';
      }
    }

    // ═══ PER-PROVIDER REFRESH ═══
    async function refreshProvider(key, btn) {
      btn.classList.add('loading');
      btn.innerHTML = '<span class="btn-spinner">⟳</span>';
      showToast(`Refreshing ${key}...`, '');
      try {
        const resp = await fetch(`/api/refresh/${key}`, { method: 'POST' });
        const result = await resp.json();
        if (result.status === 'ok') {
          showToast(`✓ ${key} refreshed`, 'success');
          quotaData = await fetchJSON('/api/data', 'data/quota_data.json');
          render();
        } else {
          showToast(`${key}: ${result.error || 'failed'}`, 'error');
        }
      } catch (e) {
        showToast('Network error', 'error');
      } finally {
        btn.classList.remove('loading');
        btn.innerHTML = '⟳';
      }
    }

    // ═══ AUTO-REFRESH ═══
    const AUTO_POLL_MS = 30000; // 30s
    let _autoPollTimer = null;

    async function autoPoll() {
      try {
        const fresh = await fetchJSON('/api/data', 'data/quota_data.json');
        if (fresh.last_updated && fresh.last_updated !== quotaData.last_updated) {
          quotaData = fresh;
          render();
        }
      } catch {}
    }

    function startAutoPoll() {
      if (_autoPollTimer) return;
      _autoPollTimer = setInterval(autoPoll, AUTO_POLL_MS);
    }

    // Pause polling when tab hidden, resume when visible
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        clearInterval(_autoPollTimer);
        _autoPollTimer = null;
      } else {
        autoPoll(); // immediate check
        startAutoPoll();
      }
    });

    // ═══ START ═══
    init().then(() => {
      // Show toast if any provider is low
      const lowProviders = [];
      for (const [key, config] of Object.entries(providerMeta)) {
        if (!config.enabled) continue;
        const d = quotaData[key];
        if (!d || d.status !== 'success') continue;
        const sd = d.data || {};
        const pctFields = ['session_used_pct','weekly_used_pct','weekly_all_used_pct','5h_quota_used_pct','5h_used_pct','current_used_pct'];
        for (const f of pctFields) {
          if (sd[f] != null && (100 - sd[f]) < 15) {
            lowProviders.push(config.name || key);
            break;
          }
        }
      }
      if (lowProviders.length) {
        showToast(`⚠️ Low quota: ${lowProviders.join(', ')}`, 'error');
      }
    });
    startAutoPoll();
  </script>
</body>
</html>
